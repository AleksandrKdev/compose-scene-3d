name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  multiplatform:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Test common code and compile Android/Desktop
        run: >-
          ./gradlew
          :scene-core:jvmTest
          :scene-compose:jvmTest
          :renderer-filament:jvmTest
          :renderer-testkit:compileKotlinJvm
          :samples:android-app:assembleDebug
          :samples:desktop-app:compileKotlinJvm

      - name: Check binary API compatibility
        run: ./gradlew checkKotlinAbi

      - name: Link iOS frameworks
        run: >-
          ./gradlew
          :samples:ios-shared:linkDebugFrameworkIosSimulatorArm64
          :samples:ios-shared:linkDebugFrameworkIosArm64

      - name: Verify local Maven alpha publications
        run: ./gradlew publishAllPublicationsToLocalAlphaRepository

      - name: Build SwiftUI iOS host
        run: >-
          xcodebuild
          -project samples/ios-app/iosApp.xcodeproj
          -scheme iosApp
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath build/ios-derived
          ARCHS=arm64
          ONLY_ACTIVE_ARCH=YES
          CODE_SIGNING_ALLOWED=NO
          build
