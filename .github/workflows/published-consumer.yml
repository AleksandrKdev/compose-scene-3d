name: Published consumer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/published-consumer.yml'
      - 'verification/published-consumer/**'

permissions:
  contents: read
  packages: read

jobs:
  compile:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve and compile published artifacts
        run: ./gradlew -p verification/published-consumer compileKotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPOSE_SCENE_3D_GROUP: dev.composescene3d
          COMPOSE_SCENE_3D_VERSION: 0.1.0-alpha01
