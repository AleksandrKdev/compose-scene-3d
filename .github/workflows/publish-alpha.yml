name: Publish alpha

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  github-packages:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '22'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Verify tests and binary API
        run: ./gradlew :scene-core:jvmTest :scene-compose:jvmTest :renderer-filament:jvmTest checkKotlinAbi

      - name: Publish to GitHub Packages
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published artifacts as an external consumer
        run: ./gradlew -p verification/published-consumer compileKotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
